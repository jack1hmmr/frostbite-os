#
# Frostbite OS archiso pacman configuration.
# The image defaults to official Arch repositories plus multilib for Steam.
# If you choose a CachyOS kernel/repo variant, add the keyring and repo here in
# a separate branch so the base profile remains reproducible on stock Arch.
#

[options]
Architecture = auto
CheckSpace
ParallelDownloads = 5
SigLevel = Required DatabaseOptional
LocalFileSigLevel = Optional
Color

[core]
Include = /etc/pacman.d/mirrorlist

[extra]
Include = /etc/pacman.d/mirrorlist

[multilib]
Include = /etc/pacman.d/mirrorlist
