---
modules-search:
  - local
  - /usr/lib/calamares/modules

instances:
  - id: frostbite-hardware
    module: shellprocess
    config: shellprocess-frostbite.conf

sequence:
  - show:
      - welcome
      - locale
      - keyboard
      - partition
      - users
      - summary
  - exec:
      - partition
      - mount
      - unpackfs
      - machineid
      - fstab
      - locale
      - keyboard
      - localecfg
      - users
      - packages
      - shellprocess@frostbite-hardware
      - bootloader
      - umount
  - show:
      - finished

branding: frostbite
prompt-install: false
dont-chroot: false
oem-setup: false
